<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
    <style>
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a58);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.contact-section {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.contact-container {
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    max-width: 400px;
    backdrop-filter: blur(10px);
}


input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    text-transform: none;
}

textarea {
    height: 100px;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background-color: #ff6b6b;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
}

button:hover {
    background-color: #ff4757;
}

.social-links {
    margin-top: 20px;
}

.social-icon {
    display: block;
    color: white;
    text-decoration: none;
    margin: 5px 0;
    transition: color 0.3s;
}

.social-icon:hover {
    color: #ff6b6b;
}
.screen-header {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: #4d4d4f;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
  width: 100%;
}

.screen-header-left {
  margin-right: auto;
}

.screen-header-button {
  display: inline-block;
  width: 8px;
  height: 8px;
  margin-right: 3px;
  border-radius: 8px;
  background: white;
}

.screen-header-button.close {
  background: #ed1c6f;
}

.screen-header-button.maximize {
  background: #e8e925;
}

.screen-header-button.minimize {
  background: #74c54f;
}

.screen-header-right {
  display: flex;
}
.screen-header-ellipsis {
  width: 3px;
  height: 3px;
  margin-left: 2px;
  border-radius: 8px;
  background: #999;
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init(CONFIG.EMAILJS_USER_ID); 
        })();
        
        function sendMail(event) {
    event.preventDefault(); 

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value.toLowerCase();
    let message = document.getElementById("message").value;
    let messageBox = document.getElementById("thank-you-message");

    if (!name || !email || !message) {
        messageBox.style.display = "block";
        messageBox.style.color = "red";
        messageBox.textContent = "All fields are required!";
        hideMessage(messageBox); 
        return;
    }

    let templateParams = {
        name: name,
        email: email,
        message: message
    };

    emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, templateParams)
    .then(() => {
        messageBox.style.display = "block";
        messageBox.style.color = "green";
        messageBox.textContent = "Thank you! I'll get in touch soon. 😊";
        document.getElementById("contact-form").reset(); 
        hideMessage(messageBox); 
    }).catch((error) => {
        messageBox.style.display = "block";
        messageBox.style.color = "red";
        messageBox.textContent = "Something went wrong. Please try again!";
        console.error("Email sending error:", error);
        hideMessage(messageBox); 
    });
}

        
        function hideMessage(element) {
            setTimeout(() => {
                element.style.display = "none";
            }, 3000);
        }
    </script>
</head>
<body>
    <section class="contact-section">
        <div class="contact-container">
            <div class="screen-header">
                <div class="screen-header-left">
                  <div class="screen-header-button close"></div>
                  <div class="screen-header-button maximize"></div>
                  <div class="screen-header-button minimize"></div>
                </div>
                <div class="screen-header-right">
                  <div class="screen-header-ellipsis"></div>
                  <div class="screen-header-ellipsis"></div>
                  <div class="screen-header-ellipsis"></div>
                </div>
              </div>
            <h2>Let's Connect & Create!</h2>
            <p>Have an idea or just want to say hi? Drop me a message below!</p>
            <form id="contact-form" onsubmit="sendMail(event)">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
                <textarea id="message" name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
            <p id="thank-you-message" style="display: none;"></p>
            <div class="social-links">
                <a href="#" class="social-icon">🔗 LinkedIn</a>
                <a href="#" class="social-icon">🐱 GitHub</a>
                <a href="#" class="social-icon">📧 Email</a>
            </div>
        </div>
    </section>
</body>
</html>
